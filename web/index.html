<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Get Open Ticket Scanner</title>
    <meta name="description" content="Download Open Ticket Scanner for iOS and Android." />
    <link rel="icon" href="/assets/icon.png" />
    <link rel="canonical" href="https://openticketscanner.com/" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background:
          radial-gradient(900px 520px at 50% -8%, rgba(34, 197, 94, 0.16), transparent 70%),
          #0b0f14;
        color: #e6edf3;
        text-align: center;
      }
      .card { max-width: 420px; width: 100%; }
      img.icon { width: 104px; height: 104px; border-radius: 24px; box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5); }
      h1 { font-size: 24px; margin: 22px 0 8px; }
      p { color: #9aa7b4; font-size: 15px; line-height: 1.5; margin: 0 0 24px; }
      .btns { display: flex; flex-direction: column; gap: 12px; }
      a.btn {
        display: block;
        text-decoration: none;
        font-weight: 700;
        padding: 14px;
        border-radius: 12px;
        font-size: 15px;
      }
      a.ios { background: #22c55e; color: #04120a; }
      a.android { background: #161b22; color: #e6edf3; border: 1px solid #2a323c; }
      .more { margin-top: 22px; font-size: 13px; }
      .more a { color: #34d399; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="icon" src="/assets/icon.png" alt="Open Ticket Scanner" />
      <h1>Open Ticket Scanner</h1>
      <p id="msg">Get the app for your device.</p>
      <div class="btns">
        <a class="btn ios" id="ios" href="https://apps.apple.com/app/id6784664554">Download on the App Store</a>
        <a class="btn android" id="android" href="https://play.google.com/store/apps/details?id=nl.fruitcake.openticketscanner">Get it on Google Play</a>
      </div>
      <p class="more"><a href="https://openticketscanner.com/">About Open Ticket Scanner →</a></p>
    </div>

    <script>
      // Send phones straight to their store; everyone else sees both options.
      (function () {
        var ua = navigator.userAgent || '';
        var ios = document.getElementById('ios').href;
        var android = document.getElementById('android').href;
        if (/iPhone|iPad|iPod/i.test(ua)) {
          document.getElementById('msg').textContent = 'Opening the App Store…';
          location.replace(ios);
        } else if (/Android/i.test(ua)) {
          document.getElementById('msg').textContent = 'Opening Google Play…';
          location.replace(android);
        }
      })();
    </script>
  </body>
</html>
