name: CI

# Headless checks that need no Mac, device, or native build:
# typecheck, unit tests, and a full Metro bundle (catches resolution errors).
# Store binaries are built separately via EAS Build.

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck · Test · Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Metro bundle (export)
        run: npx expo export --platform ios --output-dir "$RUNNER_TEMP/expo-export"
